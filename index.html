<style>

  .btn:active{background:var(--navy);}
  .hint{color:#6b7280;font-size:11px;text-align:center;line-height:1.4;}
  canvas{width:100%;max-width:340px;height:auto;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
</style>

function wrap(text,maxW){

  for(const w of words){
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW && line){lines.push(line);line=w;}
    else line=t;
  }
  if(line)lines.push(line);
  return lines;
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // fondo blanco
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  // ===== banda superior: FOTO DE LA FLOTA con velo =====
  const topH=540;
  if(flotaReady){
    // dibujar la foto cubriendo la banda (cover)
    const ir=flotaImg.width/flotaImg.height, br=W/topH;
    let dw,dh,dx,dy;
    if(ir>br){dh=topH;dw=topH*ir;dx=(W-dw)/2;dy=0;}
    else{dw=W;dh=W/ir;dx=0;dy=(topH-dh)/2;}
    ctx.save();
    ctx.beginPath();ctx.rect(0,0,W,topH);ctx.clip();
    ctx.drawImage(flotaImg,dx,dy,dw,dh);
    // velo azul corporativo semitransparente para integrar y dar contraste
    let vg=ctx.createLinearGradient(0,0,0,topH);
    vg.addColorStop(0,'rgba(15,35,80,0.62)');
    vg.addColorStop(0.5,'rgba(15,35,80,0.42)');
    vg.addColorStop(1,'rgba(15,35,80,0.66)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,topH);
    ctx.restore();
  }else{
    let gt=ctx.createLinearGradient(0,0,W,560);
    gt.addColorStop(0,C.navy);gt.addColorStop(1,C.blue);
    ctx.fillStyle=gt;ctx.fillRect(0,0,W,topH);
  }
  // barra dorada (recta)
  ctx.fillStyle=C.gold;
  ctx.fillRect(0,540,W,14);

  // ===== banda inferior =====
  let gb=ctx.createLinearGradient(0,H-240,W,H);
  gb.addColorStop(0,C.navy);gb.addColorStop(1,C.blue);
  ctx.fillStyle=gb;
  ctx.beginPath();
  ctx.moveTo(0,H-180);ctx.lineTo(W,H-240);ctx.lineTo(W,H);ctx.lineTo(0,H);
  ctx.closePath();ctx.fill();

  // ===== logo (blanco, sin fondo, sobre la foto) =====
  if(logoReady && whiteLogoReady){
    const lw=560, lh=lw*whiteLogo.height/whiteLogo.width;
    const lx=(W-lw)/2, ly=110;
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowBlur=22;ctx.shadowOffsetY=4;
    ctx.drawImage(whiteLogo,lx,ly,lw,lh);
    ctx.restore();
  }

  // ===== badge =====
  ctx.font='800 46px Segoe UI, sans-serif';
  const bt=val('i-badge').toUpperCase();
  const bw=ctx.measureText(bt).width+140;
  const bh=96;
  const bx=(W-bw)/2, by=405;
  ctx.fillStyle=C.gold;
  roundRect(bx,by,bw,bh,bh/2);ctx.fill();
  ctx.fillStyle=C.navy;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(bt,W/2,by+bh/2+3);

  // ===== título =====
  ctx.fillStyle=C.navy;
  ctx.font='800 80px Segoe UI, sans-serif';
  ctx.textAlign='center';ctx.textBaseline='top';
  const tLines=wrap(val('i-title'),900);
  let ty=730;
  for(const l of tLines){ctx.fillText(l,W/2,ty);ty+=94;}

  // ===== mensaje =====
  ty+=30;
  ctx.fillStyle=C.ink;
  ctx.font='400 46px Segoe UI, sans-serif';
  const mLines=wrap(val('i-body'),880);
  for(const l of mLines){ctx.fillText(l,W/2,ty);ty+=68;}

  // ===== divisor dorado =====
  ctx.fillStyle=C.gold;
  roundRect(W/2-60,1560,120,8,4);ctx.fill();

  // ===== contacto =====
  ctx.textAlign='center';
  ctx.fillStyle='#fff';
  ctx.font='800 48px Segoe UI, sans-serif';
  ctx.fillText('📲 '+val('i-wa'),W/2,H-150);
  ctx.fillStyle='#CDD9EA';
  ctx.font='400 32px Segoe UI, sans-serif';
  const sLines=wrap(val('i-slogan'),900);
  let sy=H-92;
  for(const l of sLines){ctx.fillText(l,W/2,sy);sy+=40;}
}

['i-badge','i-title','i-body','i-wa','i-slogan'].forEach(id=>{
  document.getElementById(id).addEventListener('input',draw);
});

function descargar(){
  draw();
  const a=document.createElement('a');
  a.download='estado_master_carga.png';
  a.href=cv.toDataURL('image/png');
  a.click();
}

// primer render aunque el logo aún no cargue
draw();
</script>
